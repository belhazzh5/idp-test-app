apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nginx-app-template
  title: Deploy Nginx Application
  description: Creates a new nginx app repo on GitHub and deploys it via ArgoCD
  tags:
    - nginx
    - kubernetes
    - gitops
spec:
  owner: user:default/belhazzh5
  type: service

  # ── Input form shown to developer ──────────────
  parameters:
    - title: Application Details
      required:
        - appName
        - description
      properties:
        appName:
          title: Application Name
          type: string
          description: Name of your application (lowercase, no spaces)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: Short description of your application
        replicas:
          title: Number of Replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 5
          description: How many pod replicas to deploy
        owner:
          title: Owner
          type: string
          description: Team or user who owns this service
          default: user:default/belhazzh5

  # ── Steps executed by Backstage scaffolder ──────
  steps:
    - id: fetch-template
      name: Fetch Template Files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          replicas: ${{ parameters.replicas }}
          owner: ${{ parameters.owner }}
          repoUrl: github.com/belhazzh5/${{ parameters.appName }}

    - id: create-repo
      name: Create GitHub Repository
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=belhazzh5&repo=${{ parameters.appName }}
        defaultBranch: main
        repoVisibility: public

    - id: create-argocd-app
      name: Create ArgoCD Application
      action: argocd:create-app
      input:
        appName: ${{ parameters.appName }}
        argoInstance: main
        projectName: default
        repoUrl: https://github.com/belhazzh5/${{ parameters.appName }}
        path: k8s
        destNamespace: ${{ parameters.appName }}
        destServer: https://kubernetes.default.svc
        syncPolicy: automated

    - id: register-catalog
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-repo'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  # ── Links shown after creation ──────────────────
  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['create-repo'].output.remoteUrl }}
        icon: github
      - title: ArgoCD Application
        url: http://localhost:30081/applications/${{ parameters.appName }}
        icon: dashboard
      - title: Open in Backstage Catalog
        url: /catalog/default/component/${{ parameters.appName }}
        icon: catalog
