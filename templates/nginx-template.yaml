apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nginx-app-template
  title: Deploy Nginx Application
  description: Creates a GitHub repo, deploys via ArgoCD, registers in catalog
  tags:
    - nginx
    - kubernetes
    - gitops
spec:
  owner: user:default/belhazzh5
  type: service

  parameters:
    - title: Application Details
      required:
        - appName
        - description
      properties:
        appName:
          title: Application Name
          type: string
          description: Lowercase name, no spaces (e.g. my-app)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
        replicas:
          title: Number of Replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 5
        owner:
          title: Owner
          type: string
          default: user:default/belhazzh5

  steps:
    - id: fetch-template
      name: Render App Files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          replicas: ${{ parameters.replicas }}
          owner: ${{ parameters.owner }}

    - id: create-repo
      name: Create GitHub Repository
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=belhazzh5&repo=${{ parameters.appName }}
        defaultBranch: main
        repoVisibility: public
        gitCommitMessage: "chore: initial scaffold via IDP"

    - id: fetch-argocd
      name: Prepare ArgoCD Manifest
      action: fetch:plain:file
      input:
        url: https://raw.githubusercontent.com/belhazzh5/idp-test-app/main/argocd-apps/.gitkeep
        targetPath: argocd-app.yaml

    - id: write-argocd
      name: Write ArgoCD App Manifest
      action: catalog:write
      input:
        filePath: argocd-apps/${{ parameters.appName }}.yaml
        entity:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ parameters.appName }}
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: https://github.com/belhazzh5/${{ parameters.appName }}
              targetRevision: main
              path: k8s
            destination:
              server: https://kubernetes.default.svc
              namespace: ${{ parameters.appName }}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true

    - id: register-catalog
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-repo'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub Repository
        url: ${{ steps['create-repo'].output.remoteUrl }}
        icon: github
      - title: Open in Catalog
        url: /catalog/default/component/${{ parameters.appName }}
        icon: catalog
