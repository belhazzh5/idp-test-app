apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-test-app
  namespace: idp-test
  labels:
    app: idp-test-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: idp-test-app
  template:
    metadata:
      labels:
        app: idp-test-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: idp-test-app
  namespace: idp-test
spec:
  selector:
    app: idp-test-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30099
  type: NodePort
